<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fun Hanzi Learn</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/style.css?v=20260315-game-settings" />
  </head>
  <body>
    <main class="app-shell app-shell-learn">
      <header class="hero hero-learn">
        <div class="hero-badge">Fun Hanzi</div>
        <h1>今天来学汉字</h1>
        <p>看看故事、认识新字、轻轻松松学一轮。</p>
      </header>

      <section class="panel panel-story">
        <div class="panel-head">
          <div>
            <div class="kicker">本周故事</div>
            <h2 id="weekTitle">正在加载本周故事包...</h2>
          </div>
          <div class="week-head-tools">
            <label class="week-picker">
              <span>学习内容</span>
              <select id="weekPicker"></select>
            </label>
            <div id="weekBadge" class="week-badge">Week</div>
          </div>
        </div>
        <p id="weekSummary" class="summary"></p>
        <div class="split-row split-row-tight">
          <div>
            <div class="mini-label">新字</div>
            <div id="newCharList" class="chip-row"></div>
          </div>
          <div>
            <div class="mini-label">复习字</div>
            <div id="reviewCharList" class="chip-row"></div>
          </div>
        </div>
        <div class="split-row split-row-tight">
          <div>
            <div class="mini-label">词语跟读</div>
            <div id="wordList" class="audio-list"></div>
          </div>
          <div>
            <div class="mini-label">句子跟读</div>
            <div id="sentenceList" class="sentence-list"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <div class="kicker">故事场景</div>
            <h2>边看边记更轻松</h2>
          </div>
        </div>
        <div id="sceneGrid" class="scene-grid"></div>
        <div id="emptyWeekState" class="empty-state hidden">还没有准备好本周内容，请让大人先去管理页生成内容。</div>
      </section>

      <section class="panel panel-study">
        <div class="panel-head">
          <div>
            <div class="kicker">今日学习</div>
            <h2>从本周故事里开始</h2>
          </div>
        </div>
        <div id="studyMeta" class="study-meta">准备开始</div>
        <div id="studyCard" class="study-card hidden">
          <div class="char-char" id="studyChar">你</div>
          <div class="char-pinyin" id="studyPinyin">ni3</div>
          <div class="char-guide" id="studyGuide"></div>
          <div class="char-meaning" id="studyMeaning">you</div>
          <div class="char-extra" id="studyWords"></div>
          <div class="char-extra char-extra-pinyin" id="studyWordPinyin"></div>
          <div class="char-extra" id="studySentence"></div>
          <div class="char-extra char-extra-pinyin" id="studySentencePinyin"></div>
          <button id="btnPlayChar" class="btn btn-audio" type="button">播放读音</button>
        </div>
        <div id="studyDone" class="empty-state hidden">今天这一轮已经完成，明天再来吧。</div>
        <div class="study-actions">
          <button id="btnUnknown" class="btn btn-secondary">不认识</button>
          <button id="btnKnown" class="btn btn-primary">认识</button>
        </div>
      </section>

      <section class="panel panel-game">
        <div class="panel-head">
          <div>
            <div class="kicker">识音游戏</div>
            <h2>听拼音点落字</h2>
          </div>
        </div>
        <div class="game-topbar">
          <div class="game-target-card">
            <div class="mini-label">当前拼音</div>
            <div id="gameTargetPinyin" class="game-target-pinyin">准备开始</div>
            <div id="gameTargetHint" class="game-target-hint">点中对应汉字就能得分，当前周的字会掉落得更多。</div>
          </div>
          <div class="game-score-grid">
            <div class="game-score-card">
              <div class="mini-label">得分</div>
              <div id="gameScore" class="game-score-value">0</div>
            </div>
            <div class="game-score-card">
              <div class="mini-label">连对</div>
              <div id="gameStreak" class="game-score-value">0</div>
            </div>
            <div class="game-score-card">
              <div class="mini-label">剩余时间</div>
              <div id="gameTimer" class="game-score-value">45</div>
            </div>
          </div>
        </div>
        <div class="game-actions">
          <button id="btnGameStart" class="btn btn-primary" type="button">开始游戏</button>
          <button id="btnGameReplay" class="btn btn-secondary" type="button">再听一次</button>
        </div>
        <div id="gameMeta" class="study-meta">从学过的字里随机掉落，先听拼音，再点字。</div>
        <div id="gameRain" class="game-rain-area">
          <div class="game-rain-backdrop"></div>
          <div class="game-rain-empty">点击“开始游戏”进入一轮 45 秒的识音挑战。</div>
        </div>
      </section>
    </main>

    <script src="/learn.js?v=20260315-game-settings"></script>
  </body>
</html>
