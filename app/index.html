<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fun Hanzi - HSK1</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <div class="hero-badge">HSK 1</div>
        <h1>Fun Hanzi</h1>
        <p>15分钟轻松学汉字，边玩边记住。</p>
      </header>

      <section class="story-panel">
        <div class="story-head">
          <div>
            <div class="story-kicker">本周故事包</div>
            <h2 id="storyTitle">正在生成本周内容...</h2>
          </div>
          <div id="weekBadge" class="week-badge">Week</div>
        </div>
        <p id="storySummary" class="story-summary"></p>
        <div id="focusChars" class="char-chips"></div>
        <div id="storyScenes" class="scene-grid"></div>
      </section>

      <section class="panel">
        <div class="status">
          <div id="sessionInfo">正在加载...</div>
          <div id="feedback" class="feedback">准备开始吧！</div>
          <div id="progressBar" class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
        </div>

        <div id="card" class="card hidden">
          <div class="char" id="charText">你</div>
          <div class="pinyin" id="pinyinText">ni3</div>
          <div class="meaning" id="meaningText">you</div>
          <div class="extra">
            <div id="wordText"></div>
            <div id="sentenceText"></div>
          </div>
        </div>

        <div class="controls">
          <button id="btnUnknown" class="btn btn-ghost">不认识</button>
          <button id="btnKnown" class="btn btn-primary">认识</button>
        </div>

        <div id="emptyState" class="empty hidden">
          目前没有可练习的内容。可以先补充字库。
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
